name: Release CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-build-linux:
    name: Release Build & Unit Tests (Linux)
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build libssl-dev zlib1g-dev libzstd-dev clang lld llvm

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBYEBYEVPN_ENABLE_TESTS=ON \
            -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Prepare artifacts
        run: |
          mkdir -p staging
          cp build/byebyevpn "staging/byebyevpn-${{ github.ref_name }}-linux-amd64"

      - name: Upload release artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: byebyevpn-${{ github.ref_name }}-linux-amd64
          path: staging/*
          retention-days: 7

  release-build-windows:
    name: Release Build & Unit Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install OpenSSL
        run: choco install openssl -y --no-progress

      - name: Locate OpenSSL
        id: openssl
        shell: pwsh
        run: |
          $dir = (Get-ChildItem "C:\Program Files\OpenSSL*" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          if (-not $dir) { throw "OpenSSL installation directory not found" }
          Write-Host "Found OpenSSL at: $dir"
          echo "root=$dir" >> $env:GITHUB_OUTPUT

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBYEBYEVPN_ENABLE_TESTS=ON -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON -DOPENSSL_ROOT_DIR="${{ steps.openssl.outputs.root }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Prepare artifacts
        shell: cmd
        run: |
          if not exist staging mkdir staging
          copy build\byebyevpn.exe "staging\byebyevpn-${{ github.ref_name }}-windows-x64.exe"

      - name: Upload release artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: byebyevpn-${{ github.ref_name }}-windows-x64.exe
          path: staging/*
          retention-days: 7

  release:
    name: Publish Release
    needs: [release-build-linux, release-build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: byebyevpn-${{ github.ref_name }}-linux-amd64
          path: out/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: byebyevpn-${{ github.ref_name }}-windows-x64.exe
          path: out/windows

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            out/linux/byebyevpn-${{ github.ref_name }}-linux-amd64
            out/windows/byebyevpn-${{ github.ref_name }}-windows-x64.exe
