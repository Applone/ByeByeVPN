name: Release CI

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-build-linux:
    name: Release Build & Unit Tests (Linux)
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    env:
      VCPKG_DEFAULT_BINARY_CACHE: /root/vcpkg-cache
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/triplets
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build clang lld llvm \
            git curl zip unzip tar pkg-config

      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git /opt/vcpkg
          /opt/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          mkdir -p $VCPKG_DEFAULT_BINARY_CACHE

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: /root/vcpkg-cache
          key: vcpkg-debian-release-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-debian-release-linux-

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-linux-static \
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/triplets \
            -DCMAKE_BUILD_TYPE=Release \
            -DBYEBYEVPN_ENABLE_TESTS=ON \
            -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Prepare artifacts
        run: |
          mkdir -p staging
          cp build/byebyevpn "staging/byebyevpn-${{ github.ref_name }}-linux-amd64"

      - name: Upload release artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: byebyevpn-${{ github.ref_name }}-linux-amd64
          path: staging/*
          retention-days: 7

  release-build-windows:
    name: Release Build & Unit Tests (Windows)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-cache
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup vcpkg cache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\vcpkg-cache"

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg-cache
          key: vcpkg-windows-release-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-windows-release-

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static-md -DCMAKE_BUILD_TYPE=Release -DVCPKG_BUILD_TYPE=Release -DBYEBYEVPN_ENABLE_TESTS=ON -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Prepare artifacts
        shell: cmd
        run: |
          if not exist staging mkdir staging
          copy build\byebyevpn.exe "staging\byebyevpn-${{ github.ref_name }}-windows-x64.exe"

      - name: Upload release artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: byebyevpn-${{ github.ref_name }}-windows-x64.exe
          path: staging/*
          retention-days: 7

  release:
    name: Publish Release
    needs: [release-build-linux, release-build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: byebyevpn-${{ github.ref_name }}-linux-amd64
          path: out/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: byebyevpn-${{ github.ref_name }}-windows-x64.exe
          path: out/windows

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            out/linux/byebyevpn-${{ github.ref_name }}-linux-amd64
            out/windows/byebyevpn-${{ github.ref_name }}-windows-x64.exe
          generate_release_notes: true
