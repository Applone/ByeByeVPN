name: Build ByeByeVPN

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  static-analysis:
    name: Static Analysis (Linux)
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev gcc g++ cppcheck clang-tidy

      - name: Configure compile database
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBYEBYEVPN_ENABLE_TESTS=OFF \
            -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Run cppcheck
        run: |
          cppcheck --std=c++20 --enable=warning,style,performance,portability \
            --error-exitcode=1 --inline-suppr --quiet src

      - name: Run clang-tidy
        run: |
          clang-tidy -p build -warnings-as-errors='*' $(find src -name '*.cpp' -print)

  debug-build-test:
    name: Debug Build & Unit Tests (${{ matrix.os }})
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    needs: [static-analysis]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            generator: Ninja
          - os: windows-latest
            generator: "Visual Studio 17 2022"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev gcc g++

      - name: Configure CMake (Linux Debug)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBYEBYEVPN_ENABLE_TESTS=ON \
            -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build (Linux Debug)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: Run unit tests (Linux Debug)
        if: runner.os == 'Linux'
        run: ctest --test-dir build --output-on-failure

      - name: Configure CMake (Windows Debug)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G "${{ matrix.generator }}" -DBYEBYEVPN_ENABLE_TESTS=ON -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build (Windows Debug)
        if: runner.os == 'Windows'
        run: cmake --build build --config Debug --parallel

      - name: Run unit tests (Windows Debug)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --build-config Debug --output-on-failure

  sanitizer-asan-ubsan:
    name: Sanitizers ASan+UBSan (Linux)
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    needs: [debug-build-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev clang lld

      - name: Configure CMake (ASan+UBSan)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build-asan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBYEBYEVPN_ENABLE_TESTS=ON \
            -DBYEBYEVPN_ENABLE_ASAN=ON \
            -DBYEBYEVPN_ENABLE_UBSAN=ON \
            -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build (ASan+UBSan)
        run: cmake --build build-asan --parallel

      - name: Run unit tests (ASan+UBSan)
        run: ctest --test-dir build-asan --output-on-failure

  sanitizer-msan:
    name: Sanitizer MSan (Linux)
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    needs: [debug-build-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev clang lld

      - name: Configure CMake (MSan)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build-msan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBYEBYEVPN_ENABLE_TESTS=ON \
            -DBYEBYEVPN_ENABLE_MSAN=ON \
            -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build (MSan)
        run: cmake --build build-msan --parallel

      - name: Run unit tests (MSan)
        run: ctest --test-dir build-msan --output-on-failure

  sanitizer-tsan:
    name: Sanitizer TSan (Linux, Optional)
    if: ${{ !startsWith(github.ref, 'refs/tags/') && vars.BYEBYEVPN_ENABLE_TSAN == 'true' }}
    needs: [debug-build-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev clang lld

      - name: Configure CMake (TSan)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build-tsan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBYEBYEVPN_ENABLE_TESTS=ON \
            -DBYEBYEVPN_ENABLE_TSAN=ON \
            -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build (TSan)
        run: cmake --build build-tsan --parallel

      - name: Run unit tests (TSan)
        run: ctest --test-dir build-tsan --output-on-failure

  coverage:
    name: Coverage (Linux)
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    needs: [sanitizer-asan-ubsan, sanitizer-msan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev gcc g++ lcov

      - name: Configure CMake (coverage)
        run: |
          cmake -S . -B build-cov -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBYEBYEVPN_ENABLE_TESTS=ON \
            -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build (coverage)
        run: cmake --build build-cov --parallel

      - name: Run unit tests (coverage)
        run: ctest --test-dir build-cov --output-on-failure

      - name: Capture coverage
        run: |
          lcov --directory build-cov --capture --output-file coverage.info --rc lcov_branch_coverage=1
          lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/tests/*' --output-file coverage.info
          genhtml coverage.info --output-directory coverage-html --branch-coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: coverage-linux
          path: |
            coverage.info
            coverage-html
          retention-days: 7

  release-build:
    name: Release Build & Unit Tests (${{ matrix.os }})
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            generator: Ninja
          - os: windows-latest
            generator: "Visual Studio 17 2022"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev gcc g++

      - name: Configure CMake (Linux Release)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBYEBYEVPN_ENABLE_TESTS=ON \
            -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build (Linux Release)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: Run unit tests (Linux Release)
        if: runner.os == 'Linux'
        run: ctest --test-dir build --output-on-failure

      - name: Configure CMake (Windows Release)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G "${{ matrix.generator }}" -DBYEBYEVPN_ENABLE_TESTS=ON -DBYEBYEVPN_WARNINGS_AS_ERRORS=ON

      - name: Build (Windows Release)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Run unit tests (Windows Release)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Prepare artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp build/byebyevpn staging/

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist staging mkdir staging
          copy build\Release\byebyevpn.exe staging\

      - name: Upload release artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: byebyevpn-${{ matrix.os }}
          path: staging/*
          retention-days: 7

  release:
    name: Publish Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [release-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: byebyevpn-ubuntu-latest
          path: out/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: byebyevpn-windows-latest
          path: out/windows

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            out/linux/byebyevpn
            out/windows/byebyevpn.exe
