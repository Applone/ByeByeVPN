name: Build ByeByeVPN

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            generator: Ninja
            compiler: gcc
          - os: windows-latest
            generator: "Visual Studio 17 2022"
            compiler: msvc

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Determine Build Type
        id: build_type
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "type=Release" >> $GITHUB_OUTPUT
          else
            echo "type=Debug" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev gcc g++

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ steps.build_type.outputs.type }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=${{ steps.build_type.outputs.type }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config ${{ steps.build_type.outputs.type }}

      - name: Prepare Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir staging
          cp build/byebyevpn staging/

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir staging
          copy build\${{ steps.build_type.outputs.type }}\byebyevpn.exe staging\

      - name: Upload Artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: byebyevpn-${{ matrix.os }}
          path: staging/*
          retention-days: 1

  release:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: byebyevpn-ubuntu-latest
          path: out/linux

      - name: Download Windows Artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: byebyevpn-windows-latest
          path: out/windows

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            out/linux/byebyevpn
            out/windows/byebyevpn.exe
